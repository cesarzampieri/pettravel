<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>TransportaPet</title>
    <script>
      // Redirect to index.html with the path preserved
      var pathSegments = window.location.pathname.split('/').filter(Boolean);
      var redirectPath = pathSegments.join('/');
      if (redirectPath) {
        window.location.replace('/?path=' + encodeURIComponent('/' + redirectPath + window.location.search));
      } else {
        window.location.replace('/');
      }
    </script>
  </head>
  <body></body>
</html>
